services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: thsip
      POSTGRES_PASSWORD: local-only
      POSTGRES_DB: thsip
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: thsip
      MINIO_ROOT_PASSWORD: local-only-secret
    volumes: ["miniodata:/data"]
volumes:
  pgdata:
  miniodata:
